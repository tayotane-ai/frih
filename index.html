<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frih — Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F3F1;
    --ink:#131210;
    --soft:#8a857d;
    --card:#E8E6E1;
    --hair:#dedad2;
    --pad:clamp(16px,3vw,40px);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .bric{font-family:"Bricolage Grotesque","Inter",sans-serif}

  /* nav */
  nav{display:flex;align-items:center;padding:22px var(--pad);gap:20px;font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:500}
  nav .grp{flex:1;display:flex;gap:26px;color:#46433d}
  nav .grp.r{justify-content:flex-end}
  nav .grp a{position:relative;padding:2px 0}
  nav .grp a::after{content:"";position:absolute;left:0;bottom:-1px;height:1.4px;width:100%;background:var(--ink);transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease)}
  nav .grp a:hover::after{transform:scaleX(1)}
  nav .brand{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:700;font-size:17px;letter-spacing:.04em;display:flex;align-items:center;gap:6px;text-transform:none}
  nav .brand .mk{font-size:12px;color:var(--soft)}

  /* giant heading */
  .title{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:700;
    font-size:clamp(72px,17.5vw,290px);line-height:.82;letter-spacing:-.045em;text-align:center;
    padding:clamp(6px,2vh,26px) var(--pad) 0;white-space:nowrap}

  /* filter cluster */
  .filters{text-align:center;padding:clamp(26px,5vh,60px) var(--pad) clamp(20px,4vh,44px)}
  .filters .ey{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--soft);font-weight:500}
  .filters .count{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:600;font-size:clamp(28px,4vw,44px);letter-spacing:-.02em;margin:8px 0 22px}
  .filters .count .tot{color:var(--soft)}
  .chips{display:inline-flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .chip{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--hair);background:transparent;
    padding:9px 16px;border-radius:30px;font-family:inherit;font-size:12.5px;letter-spacing:.04em;color:#46433d;
    cursor:pointer;transition:all .3s var(--ease)}
  .chip .sw{width:11px;height:11px;border-radius:50%;background:var(--ink);opacity:.25;transition:opacity .3s}
  .chip[aria-selected="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .chip[aria-selected="true"] .sw{opacity:1;background:var(--bg)}
  .chip:focus-visible{outline:2px solid var(--ink);outline-offset:3px}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--hair);
    border-top:1px solid var(--hair)}
  .card{position:relative;background:var(--card);aspect-ratio:4/5;overflow:hidden;
    opacity:0;transform:translateY(22px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
  .card.in{opacity:1;transform:none}
  .card.hide{display:none}

  .photo{position:absolute;inset:0 0 52px;display:flex;align-items:center;justify-content:center;transition:filter .5s var(--ease)}
  .photo img{max-height:62%;max-width:58%;object-fit:contain;transition:transform .6s var(--ease)}
  .card:hover .photo img{transform:scale(1.05) translateY(-6px)}
  .card:hover .photo{filter:brightness(.97)}

  .ph{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--soft)}
  .ph .sw{width:46px;height:46px;border-radius:50%;border:1px solid rgba(0,0,0,.16)}
  .ph .nm{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:600;font-size:14px;color:#4a4843}
  .ph .hint{font-size:10px;letter-spacing:.16em;text-transform:uppercase}

  .tag-idx{position:absolute;top:16px;left:16px;font-size:11px;letter-spacing:.1em;color:var(--soft);font-weight:500}

  .label{position:absolute;left:0;right:0;bottom:0;height:52px;display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;border-top:1px solid var(--hair);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:#3a3833;font-weight:500}
  .label .price{color:var(--ink);font-weight:600}

  /* our floating box — rises on hover */
  .info{position:absolute;left:16px;right:16px;bottom:66px;background:#fff;border:1px solid var(--hair);
    border-radius:12px;padding:16px;box-shadow:0 14px 40px rgba(0,0,0,.10);
    opacity:0;transform:translateY(12px);pointer-events:none;transition:opacity .4s var(--ease),transform .4s var(--ease)}
  .card:hover .info{opacity:1;transform:none;pointer-events:auto}
  .info .yr{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--soft);font-weight:500;margin-bottom:9px}
  .info .yr .d{width:8px;height:8px;border-radius:50%;background:var(--ink)}
  .info .desc{font-size:13px;line-height:1.42;color:#2c2a27}
  .info .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .info .tags span{font-size:10.5px;color:#56534e;border:1px solid var(--hair);border-radius:20px;padding:3px 9px}
  .info .get{margin-top:13px;display:inline-flex;align-items:center;gap:8px;
    font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:600;font-size:13px;
    border-bottom:1.5px solid var(--ink);padding-bottom:4px;transition:gap .3s var(--ease)}
  .info .get:hover{gap:13px}

  /* footer */
  footer{padding:clamp(48px,9vh,120px) var(--pad) 30px}
  footer .lockup{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:600;
    font-size:clamp(40px,11vw,180px);line-height:.82;letter-spacing:-.045em}
  footer .lockup em{font-style:italic;font-weight:300}
  footer .frow{display:flex;justify-content:space-between;gap:16px;margin-top:32px;padding-top:22px;
    border-top:1px solid var(--hair);color:var(--soft);font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;flex-wrap:wrap}

  @media (max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr)}
    nav .grp .sec{display:none}
    .title{font-size:clamp(56px,18vw,120px)}
  }
  @media (max-width:560px){
    .grid{grid-template-columns:1fr}
    .card{aspect-ratio:3/4}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}.card{opacity:1;transform:none}}
</style>
</head>
<body>

  <nav>
    <div class="grp">
      <a href="#">About</a><a href="#" class="sec">Catalog</a>
    </div>
    <div class="brand">Frih <span class="mk">✳</span></div>
    <div class="grp r">
      <a href="#" class="sec">Contact</a><a href="#">Menu</a>
    </div>
  </nav>

  <h1 class="title">CATALOG</h1>

  <section class="filters">
    <div class="ey">Filters</div>
    <div class="count"><span class="shown" id="shown">10</span> / <span class="tot" id="tot">10</span></div>
    <div class="chips" id="chips" role="tablist"></div>
  </section>

  <main class="grid" id="grid"></main>

  <footer>
    <div class="lockup">Move <em>freely.</em></div>
    <div class="frow"><span>Made to move with you — always free</span><span>Frih ✳ · © 2025</span></div>
  </footer>

<script>
const PANTS = [
  {name:"Cobalt",  cat:["palazzo"],     file:"Blue_Boogie3erfdas.png",  hex:"#2f5fd6", desc:"High-rise palazzo in a clean cobalt drape, pressed crease, floor-skimming.", tags:["Wide-leg","Pleated"]},
  {name:"Crimson", cat:["palazzo"],     file:"Red_Boogie3erfdas.png",   hex:"#ee2d1f", desc:"The signature wide-leg in vivid crimson. Tailored waist, fluid fall.", tags:["Wide-leg","Tailored"]},
  {name:"Forest",  cat:["palazzo"],     file:"Green_Boogie3erfdas.png", hex:"#2e9e3f", desc:"Deep forest palazzo with an architectural sweep and sharp pleats.", tags:["Wide-leg","Pleated"]},
  {name:"Rose",    cat:["palazzo"],     file:"Pink_Boogie3erfdas.png",  hex:"#e89bb8", desc:"Soft rose palazzo, made to move. Full leg, pressed seams.", tags:["Wide-leg","Soft"]},
  {name:"Rust",    cat:["palazzo"],     file:"Brown_Boogie3erfdas.png", hex:"#9e4521", desc:"Warm rust wide-leg with a heavier drape for cooler light.", tags:["Wide-leg","Heavy"]},
  {name:"Ink",     cat:["palazzo"],     file:"Black_Boogie3erfdas.png", hex:"#2a2a2a", desc:"The all-day black palazzo. Clean line, total ease.", tags:["Wide-leg","Everyday"]},
  {name:"Sky",     cat:["jorts","new"], file:"Sky_Jort.png",            hex:"#a8c5dd", desc:"Palazzo, cropped. Pleated sky-blue jort, knee-length wide leg.", tags:["Cropped","Pleated"]},
  {name:"Blush",   cat:["jorts","new"], file:"Pink_Jort.png",           hex:"#e89bb8", desc:"The jort in blush. Same width, summer-weight cotton.", tags:["Cropped","Summer"]},
  {name:"Bone",    cat:["jorts","new"], file:"Bone_Jort.png",           hex:"#ece3ce", desc:"Bone jort, buttoned waist, deep pleat. Neutral and sharp.", tags:["Cropped","Neutral"]},
  {name:"Maize",   cat:["jorts","new"], file:"Yellow_Jort.png",         hex:"#e6c75e", desc:"Maize jort, pressed and pleated, cropped at the knee.", tags:["Cropped","Pleated"]},
];
const IMAGES = {}; /* fill with base64/url to render real photos */

/* chips */
const TABS=[["all","All"],["palazzo","Palazzo"],["jorts","Jorts"],["new","New In"]];
document.getElementById("chips").innerHTML = TABS.map(([c,l],i)=>
  `<button class="chip" role="tab" aria-selected="${i===0}" data-cat="${c}"><span class="sw"></span>${l}</button>`).join("");

/* cards */
const grid=document.getElementById("grid");
function photo(p){
  const src=IMAGES[p.file];
  if(src) return `<div class="photo"><img src="${src}" alt="${p.name}"></div>`;
  return `<div class="photo"><div class="ph"><div class="sw" style="background:${p.hex}26;border-color:${p.hex}66"></div><div class="nm">${p.name}</div><div class="hint">photo slot ready</div></div></div>`;
}
grid.innerHTML = PANTS.map((p,i)=>{
  const kind=p.cat.includes("jorts")?"Jort":"Palazzo";
  return `<article class="card" data-cat="${p.cat.join(' ')}">
    ${photo(p)}
    <div class="tag-idx">${String(i+1).padStart(2,"0")} / ${String(PANTS.length).padStart(2,"0")}</div>
    <div class="info">
      <div class="yr"><span class="d"></span> 2025</div>
      <div class="desc">${p.desc}</div>
      <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join("")}</div>
      <a href="#" class="get">Get This ↗</a>
    </div>
    <div class="label"><span>${p.name} ${kind}</span><span class="price">Free</span></div>
  </article>`;
}).join("");

/* reveal */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.1});
document.querySelectorAll(".card").forEach(c=>io.observe(c));

/* filtering */
const chips=document.getElementById("chips");
const shownEl=document.getElementById("shown");
chips.addEventListener("click",e=>{
  const t=e.target.closest(".chip"); if(!t)return;
  [...chips.children].forEach(b=>b.setAttribute("aria-selected",b===t?"true":"false"));
  const cat=t.dataset.cat; let n=0;
  document.querySelectorAll(".card").forEach(c=>{
    const show=cat==="all"||c.dataset.cat.split(" ").includes(cat);
    c.classList.toggle("hide",!show);
    if(show){n++;c.classList.remove("in");requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.add("in")));}
  });
  shownEl.textContent=String(n).padStart(2,"0");
});
</script>
</body>
</html>
