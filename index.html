<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frih — Made to Move with you</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F0EEEA;--ink:#131210;--soft:#8a857d;--card:#fff;--hair:#dedad2;--green:#1a7a2e;--ease:cubic-bezier(.22,.61,.36,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink);overflow:hidden;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}

  .announce{flex:0 0 auto;background:#fdebe9;color:#c5281c;overflow:hidden;position:relative;padding:10px 0;cursor:default}
  .announce-track{display:flex;width:max-content;will-change:transform}
  .announce-item{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;white-space:nowrap;padding:0 28px}
  .announce-item a{text-decoration:underline;text-underline-offset:2px;font-weight:700;pointer-events:auto}
  .announce-item a:hover{opacity:.85}

  .page{display:flex;flex:1;min-height:0}

  /* LEFT */
  .left{flex:0 0 48%;display:flex;flex-direction:column;padding:clamp(24px,3.5vw,44px);overflow:auto}
  .nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto}
  .logo svg{height:30px;width:auto}
  .nav-links{display:flex;gap:10px;align-items:center}
  .nav-links a{font-size:13px;font-weight:500;color:var(--soft);padding:8px 14px;border-radius:30px;transition:all .25s}
  .nav-links a:hover{color:var(--ink)}
  .nav-links .primary{background:var(--ink);color:#fff}
  .nav-links .primary:hover{opacity:.9}

  .hero-content{margin-top:auto;margin-bottom:0;max-width:480px}
  .badge{display:inline-flex;align-items:center;gap:8px;background:#e8281c;border:1px solid #e8281c;border-radius:30px;padding:6px 16px 6px 8px;font-size:12px;font-weight:700;margin-bottom:clamp(18px,3vh,32px);color:#fff;box-shadow:0 4px 16px rgba(232,40,28,.35)}
  .badge .dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
  h1{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:600;font-size:clamp(36px,5.5vw,62px);line-height:1;letter-spacing:-.035em;margin-bottom:clamp(14px,2vh,22px)}
  h1 em{font-style:italic;font-weight:300}
  .desc{font-size:clamp(14px,1.1vw,15.5px);line-height:1.55;color:#4a473f;margin-bottom:clamp(22px,3.5vh,36px);max-width:400px}
  .desc b{color:var(--ink);font-weight:600}
  .ctas{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .cta-ig{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#fff;padding:15px 26px;border-radius:40px;font-weight:600;font-size:14.5px;font-family:"Bricolage Grotesque","Inter",sans-serif;transition:transform .25s var(--ease)}
  .cta-ig:hover{transform:translateY(-2px)}
  .cta-ig svg{flex-shrink:0}
  .cta-store{display:inline-flex;align-items:center;gap:8px;padding:15px 22px;border-radius:40px;font-weight:500;font-size:14px;border:1.5px solid var(--hair);color:var(--ink);transition:border-color .25s}
  .cta-store:hover{border-color:var(--ink)}

  /* RIGHT — carousel */
  .right{flex:1;position:relative;padding:clamp(24px,3vw,40px);display:flex;flex-direction:column}
  .carousel{flex:1;position:relative;border-radius:16px;overflow:hidden;background:#fff}
  .c-track{position:relative;height:100%}
  .c-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:clamp(8px,1.4vw,18px);
    opacity:0;transform:scale(1.015);transition:opacity 1.4s cubic-bezier(.45,0,.2,1),transform 1.6s cubic-bezier(.45,0,.2,1);pointer-events:none}
  .c-slide.active{opacity:1;transform:scale(1);pointer-events:auto;z-index:2}
  .c-slide.dragtop{transition:none!important}
  .c-slide img{max-height:100%;max-width:100%;object-fit:contain;filter:drop-shadow(0 12px 40px rgba(0,0,0,.08))}
  .c-slide .c-label{position:absolute;bottom:clamp(14px,2vw,24px);left:clamp(14px,2vw,24px);right:clamp(14px,2vw,24px);display:flex;align-items:center;justify-content:space-between;
    opacity:0;transition:opacity 1s ease .25s;z-index:6}
  .c-slide.active .c-label{opacity:1}
  .c-label .c-name{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:600;font-size:clamp(16px,1.4vw,20px)}
  .c-label .c-type{font-size:12px;color:var(--soft);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
  .c-label .c-price{text-align:right}
  .c-label .c-now{font-family:"Bricolage Grotesque","Inter",sans-serif;font-weight:700;font-size:clamp(15px,1.2vw,18px)}
  .c-label .c-was{font-size:11.5px;color:var(--soft);text-decoration:line-through}

  /* status bars — top of carousel, inside */
  .c-bars{position:absolute;top:14px;left:14px;right:14px;display:flex;gap:4px;z-index:10}
  .c-bar{flex:1;height:3px;background:rgba(0,0,0,.12);border-radius:2px;overflow:hidden;cursor:pointer}
  .c-bar .c-fill{height:100%;width:0;background:var(--ink);border-radius:2px;transition:width .15s linear}
  .c-bar.done .c-fill{width:100%}

  /* prev/next arrows — inside carousel, hover-reveal on desktop only */
  .c-nav{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:9;pointer-events:none}
  .c-nav button{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s,opacity .3s;color:var(--ink);opacity:0;pointer-events:auto;box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .carousel:hover .c-nav button{opacity:1}
  .c-nav button:hover{background:var(--ink);color:#fff}

  @media(max-width:900px){
    .page{flex-direction:column;overflow:auto}
    body{overflow:auto}
    .left{flex:0 0 auto;padding:20px 20px 0}
    .hero-content{margin:clamp(16px,3vh,30px) 0}
    .right{padding:16px 16px 20px;min-height:50vh}
    .c-nav{display:none}
  }
  @media(prefers-reduced-motion:reduce){.c-track{transition:none}}
</style>
</head>

};

const P=[
  {n:"Cobalt",t:"Palazzo",f:"Blue_Boogie3erfdas.png"},
  {n:"Crimson",t:"Palazzo",f:"Red_Boogie3erfdas.png"},
  {n:"Forest",t:"Palazzo",f:"Green_Boogie3erfdas.png"},
  {n:"Rose",t:"Palazzo",f:"Pink_Boogie3erfdas.png"},
  {n:"Rust",t:"Palazzo",f:"Brown_Boogie3erfdas.png"},
  {n:"Ink",t:"Palazzo",f:"Black_Boogie3erfdas.png"},
  {n:"Sky",t:"Jort",f:"Red_Boogie-3.png"},
  {n:"Blush",t:"Jort",f:"Red_Boogie-2.png"},
  {n:"Bone",t:"Jort",f:"Red_Boogie-1.png"},
  {n:"Maize",t:"Jort",f:"Red_Boogie.png"},
];
const N=P.length,DUR=8000; // 8s per slide, slow and calm
let cur=0,raf=null,t0=0;
const WA_NUMBER="2349164162270";

const track=document.getElementById("cTrack");
track.innerHTML=P.map((p,i)=>`<div class="c-slide" data-i="${i}">
  <img src="${IMAGES[p.f]}" alt="${p.n}" loading="${i===0?'eager':'lazy'}">
  <div class="c-label">
    <div><div class="c-name">${p.n}</div><div class="c-type">${p.t}</div></div>
    <div class="c-price"><div class="c-now">\u20a625,000</div><div class="c-was">\u20a635,000</div></div>
  </div>
</div>`).join("");

document.getElementById("cBars").innerHTML=P.map((_,i)=>`<div class="c-bar" data-i="${i}"><div class="c-fill" id="cf${i}"></div></div>`).join("");

function waLink(){
  const msg=`Hi Frih!\n\nI'd like to preorder Frih Pants.\nI know there's a preorder discount.\n\nCould you confirm next steps?`;
  return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
}
document.getElementById("waBtn").setAttribute("href",waLink());

// Build infinite marquee — repeat item enough times, doubled for seamless loop
const ITEM=`<div class="announce-item">🚧 Website under construction — kindly order on WhatsApp <a href="${waLink()}" target="_blank" class="waTopLink">Order now →</a></div>`;
const REPEAT=8;
const announceEl=document.getElementById("announce");
const trackEl=document.getElementById("announceTrack");
trackEl.innerHTML=(ITEM.repeat(REPEAT))+(ITEM.repeat(REPEAT));

// JS-driven marquee: slow constant autoscroll, dramatically slows on hover
// so the "Order now" link is easy to read and click.
(function(){
  let pos=0;
  let loopWidth=0;
  let hovering=false;
  let lastTime=performance.now();

  function measure(){ loopWidth=trackEl.scrollWidth/2; }
  measure();
  window.addEventListener("resize",measure);

  announceEl.addEventListener("pointerenter",()=>{hovering=true});
  announceEl.addEventListener("pointerleave",()=>{hovering=false});

  function tick(now){
    const dt=Math.min(now-lastTime,50);
    lastTime=now;
    const baseSpeed=28;        // px/sec normal autoscroll
    const hoverSpeed=2.2;      // px/sec — dramatically slower on hover, easy to read/click
    const speed=hovering?hoverSpeed:baseSpeed;
    pos-=speed*(dt/1000);
    if(loopWidth>0 && pos<=-loopWidth) pos+=loopWidth;
    trackEl.style.transform=`translateX(${pos}px)`;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

function go(idx){
  if(idx<0)idx=N-1;if(idx>=N)idx=0;
  cur=idx;
  document.querySelectorAll(".c-slide").forEach(s=>s.classList.toggle("active",+s.dataset.i===cur));
  for(let i=0;i<N;i++){
    const f=document.getElementById("cf"+i);
    f.style.transition="none";f.style.width=i<idx?"100%":"0%";
  }
  startTick();
}
function startTick(){
  cancelAnimationFrame(raf);t0=performance.now();
  (function tick(now){
    const p=Math.min((now-t0)/DUR,1);
    const f=document.getElementById("cf"+cur);
    if(f){f.style.width=(p*100)+"%"}
    if(p>=1){go(cur+1);return}
    raf=requestAnimationFrame(tick);
  })(performance.now());
}

document.getElementById("nextBtn").addEventListener("click",()=>go(cur+1));
document.getElementById("prevBtn").addEventListener("click",()=>go(cur-1));
document.querySelectorAll(".c-bar").forEach(b=>b.addEventListener("click",()=>go(+b.dataset.i)));

// Swipe — just triggers the same gentle crossfade
let sx=0,sy=0,dx=0,sw=false,locked=false;
const car=document.getElementById("carousel");
car.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;sw=true;locked=false},{passive:true});
car.addEventListener("touchmove",e=>{
  if(!sw)return;
  const mx=e.touches[0].clientX,my=e.touches[0].clientY;
  if(!locked){
    if(Math.abs(mx-sx)>Math.abs(my-sy)*1.3) locked=true;
    else{sw=false;return}
  }
  dx=mx-sx;
},{passive:true});
car.addEventListener("touchend",()=>{
  if(!sw||!locked)return;sw=false;
  const th=60;
  if(dx<-th)go(cur+1);else if(dx>th)go(cur-1);
});

go(0);
</script>
</body>
</html>
